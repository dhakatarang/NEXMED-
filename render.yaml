services:
  - type: web
    name: nexmed-backend
    runtime: node
    plan: free
    buildCommand: npm install  # Remove 'cd backend &&'
    startCommand: node server.js  # Remove 'cd backend &&'
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_SERVICE
        value: gmail
    disk:
      name: nexmed-data
      mountPath: /data
      sizeGB: 1