services:
  - type: web
    name: nexmed-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: RENDER
        value: true
      - key: JWT_SECRET
        generateValue: true